<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oliver Phelan Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  body{ overflow: hidden; }

  .stage{
    position: relative;
    z-index: 2;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  #pebbles{
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }

  .mark{
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(28px, 5.4vw, 58px);
    line-height: 1.05;
    letter-spacing: -0.005em;
    text-transform: uppercase;
    margin: 0;
  }

  .mark span{ display:block; }
  .mark .out{ -webkit-text-stroke: 1px var(--bone); color: transparent; }

  .tagline{
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--bone-dim);
  }

  nav.links{
    display: flex;
    gap: 14px;
    margin-top: 46px;
  }

  .tab{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 13px 26px;
    border: 1px solid var(--line);
    background: var(--panel);
    transition: border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }
  .tab:hover{
    border-color: var(--rust);
    color: var(--bone);
    transform: translateY(-1px);
  }

</style>
</head>
<body class="grain">

  <div class="bracket-frame">
    <span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span>
  </div>

  <canvas id="pebbles"></canvas>

  <div class="stage" id="stage">
    <div id="content">
      <h1 class="mark">
        <span>Oliver Phelan</span>
        <span class="out">Portfolio</span>
      </h1>
      <p class="tagline">Menswear — London</p>

=======
    <nav class="links">
      <a class="tab" href="portfolio.html">Portfolio</a>
      <a class="tab" href="https://instagram.com/1027.004.04204" target="_blank" rel="noopener">Instagram</a>
    </nav>

  </div>

<script src="assets/js/pebbles.js"></script>
</body>
</html>
