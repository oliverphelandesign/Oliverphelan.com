<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — STUDIO NAME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  html, body{ height: 100%; overflow: hidden; }

  header.bar{
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 26px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  header.bar a{ color: var(--bone-dim); }
  header.bar a:hover{ color: var(--rust); }
  header.bar .count{ color: var(--bone-dim); }

  #rail{
    display: flex;
    align-items: stretch;
    height: 100vh;
    width: 100vw;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: auto;
    scrollbar-width: none;
  }
  #rail::-webkit-scrollbar{ display: none; }

  .slide{
    flex: 0 0 auto;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-right: 1px solid var(--line);
  }

  .slide img, .slide video, .slide canvas{
    max-height: 84vh;
    max-width: 84vw;
    object-fit: contain;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
  }

  .tag{
    position: absolute;
    left: 26px;
    bottom: 22px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bone-dim);
  }
  .tag .idx{ color: var(--rust); margin-right: 8px; }

  .empty{
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bone-dim);
    text-align: center;
    max-width: 480px;
    line-height: 1.7;
  }

  .progress{
    position: fixed;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--rust);
    z-index: 500;
    transition: width 0.08s linear;
  }
</style>
</head>
<body class="grain">

  <div class="bracket-frame">
    <span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span>
  </div>

  <header class="bar">
    <a href="index.html">&larr; Index</a>
    <span class="count" id="count">— / —</span>
  </header>

  <div id="rail" class="textured">
    <div class="slide"><p class="empty">Loading work&hellip;</p></div>
  </div>

  <div class="progress" id="progress" style="width:0%"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="assets/js/portfolio.js"></script>
</body>
</html>
